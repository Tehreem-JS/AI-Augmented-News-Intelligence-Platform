version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: technews-db
    environment:
      POSTGRES_DB: technews
      POSTGRES_USER: techuser
      POSTGRES_PASSWORD: techpass123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techuser -d technews"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - technews-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: technews-backend
    environment:
      DATABASE_URL: postgresql://techuser:techpass123@postgres:5432/technews
      # ⚠️ ADD YOUR API KEY HERE OR USE .env FILE
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    networks:
      - technews-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  technews-network:
    driver: bridge